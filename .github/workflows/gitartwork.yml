name: Generate Git Artwork

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */24 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: jasineri/gitartwork@v1   # ✅ FIXED HERE
        with:
          user_name: Vish
          text: VISHAKHA

      - name: Commit SVG
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add gitartwork.svg
          git commit -m "update gitartwork" || echo "No changes"
          git push
