name: Generate Git Artwork

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */24 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Generate SVG
        uses: jasineri/gitartwork@v2
        with:
          user_name: Vish   # ⚠️ your username
          text: VISHAKHA

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add gitartwork.svg
          git commit -m "update gitartwork" || echo "No changes"
          git push
